name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --ignore=tests/test_endpoints.py --ignore=tests/test_manifest.py --ignore=tests/test_patterns.py --ignore=tests/test_permissions.py --ignore=tests/test_trackers.py
